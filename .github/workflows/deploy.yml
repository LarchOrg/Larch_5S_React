name: Deploy React App

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install
        working-directory: ./

      - name: Build React App
        run: npm run build
        working-directory: ./

      - name: Docker login
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build Docker image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/5sfrontend:latest ./

      - name: Push Docker image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/5sfrontend:latest

      - name: Deploy to Linux
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            docker pull ${{ secrets.DOCKER_USERNAME }}/5sfrontend:latest
            docker stop 5SDash || true
            docker rm 5SDash || true
            docker run -d -p 127.0.0.1:8092:80 --name 5SDash ${{ secrets.DOCKER_USERNAME }}/5sfrontend:latest